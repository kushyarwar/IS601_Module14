<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculations</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #f5f7fa; color: #1f2933; min-height: 100vh; }
        header { background: #263238; color: white; padding: 18px 24px; display: flex; justify-content: space-between; align-items: center; gap: 16px; }
        header h1 { font-size: 22px; font-weight: 700; }
        header a, header button { color: white; border: 1px solid rgba(255,255,255,0.5); background: transparent; border-radius: 4px; padding: 8px 12px; text-decoration: none; cursor: pointer; }
        main { width: min(1100px, calc(100% - 32px)); margin: 24px auto; display: grid; grid-template-columns: 340px 1fr; gap: 24px; align-items: start; }
        section { background: white; border: 1px solid #d9e2ec; border-radius: 8px; padding: 20px; }
        h2 { font-size: 18px; margin-bottom: 16px; }
        .form-group { margin-bottom: 14px; }
        label { display: block; font-size: 14px; font-weight: 700; margin-bottom: 6px; color: #334e68; }
        input, select { width: 100%; padding: 10px 12px; border: 1px solid #bcccdc; border-radius: 4px; font-size: 15px; }
        input:focus, select:focus { outline: none; border-color: #1976d2; box-shadow: 0 0 0 2px rgba(25,118,210,0.12); }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .actions { display: flex; gap: 10px; margin-top: 8px; }
        button.primary { background: #1976d2; border: 1px solid #1976d2; color: white; }
        button.secondary { background: white; border: 1px solid #9fb3c8; color: #243b53; }
        button.danger { background: #c62828; border: 1px solid #c62828; color: white; }
        button { border-radius: 4px; padding: 10px 12px; cursor: pointer; font-weight: 700; }
        #error-msg, #success-msg, #detail-box { margin-bottom: 16px; padding: 10px 12px; border-radius: 4px; display: none; font-size: 14px; }
        #error-msg { color: #b71c1c; background: #ffebee; }
        #success-msg { color: #1b5e20; background: #e8f5e9; }
        #detail-box { color: #243b53; background: #eef4f8; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th, td { padding: 10px; border-bottom: 1px solid #d9e2ec; text-align: left; }
        th { background: #f0f4f8; color: #334e68; }
        td button { padding: 6px 8px; margin-right: 6px; font-size: 13px; }
        .empty { color: #627d98; padding: 14px 0; display: none; }
        @media (max-width: 820px) {
            header { align-items: flex-start; flex-direction: column; }
            main { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <header>
        <h1>Calculation Manager</h1>
        <div>
            <a href="/static/login.html">Login</a>
            <button id="logout-btn" type="button">Logout</button>
        </div>
    </header>

    <main>
        <section>
            <h2 id="form-title">Add Calculation</h2>
            <div id="error-msg"></div>
            <div id="success-msg"></div>
            <form id="calc-form">
                <input type="hidden" id="calc-id">
                <div class="row">
                    <div class="form-group">
                        <label for="a">Operand A</label>
                        <input type="number" step="any" id="a" required>
                    </div>
                    <div class="form-group">
                        <label for="b">Operand B</label>
                        <input type="number" step="any" id="b" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="type">Operation</label>
                    <select id="type" required>
                        <option value="Add">Add</option>
                        <option value="Sub">Sub</option>
                        <option value="Multiply">Multiply</option>
                        <option value="Divide">Divide</option>
                    </select>
                </div>
                <div class="actions">
                    <button class="primary" id="save-btn" type="submit">Save</button>
                    <button class="secondary" id="reset-btn" type="button">Reset</button>
                </div>
            </form>
        </section>

        <section>
            <h2>My Calculations</h2>
            <div id="detail-box"></div>
            <p class="empty" id="empty-msg">No calculations yet.</p>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>A</th>
                        <th>B</th>
                        <th>Type</th>
                        <th>Result</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="calc-list"></tbody>
            </table>
        </section>
    </main>

    <script>
        const tokenKey = 'jwt_token';
        const operations = ['Add', 'Sub', 'Multiply', 'Divide'];
        const form = document.getElementById('calc-form');
        const calcList = document.getElementById('calc-list');
        const calcId = document.getElementById('calc-id');
        const aInput = document.getElementById('a');
        const bInput = document.getElementById('b');
        const typeInput = document.getElementById('type');
        const errorMsg = document.getElementById('error-msg');
        const successMsg = document.getElementById('success-msg');
        const detailBox = document.getElementById('detail-box');
        const emptyMsg = document.getElementById('empty-msg');
        const formTitle = document.getElementById('form-title');

        function token() {
            return localStorage.getItem(tokenKey);
        }

        function showMessage(box, msg) {
            box.textContent = msg;
            box.style.display = 'block';
        }

        function clearMessages() {
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';
            detailBox.style.display = 'none';
        }

        function authHeaders() {
            return {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + token(),
            };
        }

        async function api(path, options = {}) {
            if (!token()) {
                throw new Error('Please login first.');
            }
            const res = await fetch(path, {
                ...options,
                headers: { ...authHeaders(), ...(options.headers || {}) },
            });
            if (res.status === 204) {
                return null;
            }
            const data = await res.json();
            if (!res.ok) {
                throw new Error(data.detail || 'Request failed.');
            }
            return data;
        }

        function validateForm() {
            const a = Number(aInput.value);
            const b = Number(bInput.value);
            const type = typeInput.value;
            if (!Number.isFinite(a) || !Number.isFinite(b)) {
                return 'Operands must be valid numbers.';
            }
            if (!operations.includes(type)) {
                return 'Please choose a valid operation.';
            }
            if (type === 'Divide' && b === 0) {
                return 'Division by zero is not allowed.';
            }
            return '';
        }

        function resetForm() {
            calcId.value = '';
            form.reset();
            formTitle.textContent = 'Add Calculation';
            document.getElementById('save-btn').textContent = 'Save';
        }

        function fillForm(calc) {
            calcId.value = calc.id;
            aInput.value = calc.a;
            bInput.value = calc.b;
            typeInput.value = calc.type;
            formTitle.textContent = 'Edit Calculation #' + calc.id;
            document.getElementById('save-btn').textContent = 'Update';
        }

        function renderRows(calculations) {
            calcList.innerHTML = '';
            emptyMsg.style.display = calculations.length ? 'none' : 'block';
            calculations.forEach((calc) => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${calc.id}</td>
                    <td>${calc.a}</td>
                    <td>${calc.b}</td>
                    <td>${calc.type}</td>
                    <td>${calc.result}</td>
                    <td>
                        <button class="secondary" type="button" data-action="read" data-id="${calc.id}">Read</button>
                        <button class="secondary" type="button" data-action="edit" data-id="${calc.id}">Edit</button>
                        <button class="danger" type="button" data-action="delete" data-id="${calc.id}">Delete</button>
                    </td>
                `;
                calcList.appendChild(row);
            });
        }

        async function loadCalculations() {
            try {
                const calculations = await api('/calculations');
                renderRows(calculations);
            } catch (err) {
                showMessage(errorMsg, err.message);
            }
        }

        form.addEventListener('submit', async (event) => {
            event.preventDefault();
            clearMessages();
            const validationError = validateForm();
            if (validationError) {
                showMessage(errorMsg, validationError);
                return;
            }

            const payload = {
                a: Number(aInput.value),
                b: Number(bInput.value),
                type: typeInput.value,
            };
            const id = calcId.value;
            try {
                if (id) {
                    await api('/calculations/' + id, { method: 'PUT', body: JSON.stringify(payload) });
                    showMessage(successMsg, 'Calculation updated.');
                } else {
                    await api('/calculations', { method: 'POST', body: JSON.stringify(payload) });
                    showMessage(successMsg, 'Calculation created.');
                }
                resetForm();
                await loadCalculations();
            } catch (err) {
                showMessage(errorMsg, err.message);
            }
        });

        calcList.addEventListener('click', async (event) => {
            const button = event.target.closest('button[data-action]');
            if (!button) return;
            clearMessages();
            const id = button.dataset.id;
            try {
                if (button.dataset.action === 'delete') {
                    await api('/calculations/' + id, { method: 'DELETE' });
                    showMessage(successMsg, 'Calculation deleted.');
                    await loadCalculations();
                    return;
                }
                const calc = await api('/calculations/' + id);
                if (button.dataset.action === 'edit') {
                    fillForm(calc);
                } else {
                    showMessage(detailBox, `Calculation #${calc.id}: ${calc.a} ${calc.type} ${calc.b} = ${calc.result}`);
                }
            } catch (err) {
                showMessage(errorMsg, err.message);
            }
        });

        document.getElementById('reset-btn').addEventListener('click', () => {
            clearMessages();
            resetForm();
        });

        document.getElementById('logout-btn').addEventListener('click', () => {
            localStorage.removeItem(tokenKey);
            window.location.href = '/static/login.html';
        });

        loadCalculations();
    </script>
</body>
</html>
